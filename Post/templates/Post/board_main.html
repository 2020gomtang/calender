<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>Post 독립 공유 게시판</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.css">
    <style>
        :root {
            --bg-color: #fafafa;
            --card-bg: #ffffff;
            --text-color: #2b2b2b;
            --border-color: #e5e5e5;
            --primary-color: #4a90e2;
            --success-color: #2ecc71;
            --danger-color: #e74c3c;
            --nav-bg: #f1f1ef;
        }
        body { font-family: 'Pretendard', sans-serif; background-color: var(--bg-color); color: var(--text-color); padding: 20px 40px; }
        .container { max-width: 600px; margin: 0 auto; }

        /* 📡 상단 통합 내비게이션 바 유지 */
        .top-nav {
            display: flex; justify-content: space-between; align-items: center;
            background: var(--nav-bg); padding: 12px 24px; border-radius: 8px; margin-bottom: 24px;
        }
        .nav-logo { font-weight: 700; font-size: 16px; color: #111; }
        .nav-links { display: flex; gap: 12px; }
        .nav-btn {
            text-decoration: none; font-size: 13px; font-weight: 500; color: #555;
            padding: 6px 12px; border-radius: 4px; background: #fff; border: 1px solid var(--border-color);
        }
        .nav-btn:hover { background: #e9e9e6; color: #111; }

        .header { margin-bottom: 30px; border-bottom: 2px solid var(--border-color); padding-bottom: 15px; }
        .post-card { background: var(--card-bg); border: 1px solid var(--border-color); border-radius: 12px; padding: 20px; margin-bottom: 20px; box-shadow: 0 2px 8px rgba(0,0,0,0.02); }
        .card-top { display: flex; justify-content: space-between; align-items: center; margin-bottom: 10px; }
        .user-info { font-weight: 700; color: #333; }
        .status-badge { font-size: 11px; padding: 4px 8px; border-radius: 20px; color: #fff; font-weight: bold; }
        .status-badge.PENDING { background: #f39c12; }
        .status-badge.SUCCESS { background: var(--success-color); }
        .status-badge.FAIL { background: var(--danger-color); }

        .post-body { font-size: 15px; margin-bottom: 15px; font-weight: 500; }

        .comment-wrapper { background: #f9f9f9; border-radius: 6px; padding: 12px; margin-top: 15px; }
        .comment-line { font-size: 13px; margin-bottom: 6px; border-bottom: 1px solid #f1f1f1; padding-bottom: 4px; }
        .comment-user { font-weight: bold; color: #555; }
        .input-row { display: flex; gap: 6px; margin-top: 10px; }
        .comment-input { flex: 1; padding: 6px; border: 1px solid var(--border-color); border-radius: 4px; font-size: 13px; }
        .submit-btn { background: var(--primary-color); border: none; color: #fff; padding: 6px 12px; border-radius: 4px; cursor: pointer; font-size: 12px; }
    </style>
</head>
<body>

<div class="workspace container">
    <div class="top-nav">
        <div class="nav-logo">🚀 소셜 피드 게시판</div>
        <div class="nav-links">
            <a href="/api/user/main/" class="nav-btn">🏠 홈 워크스페이스</a>
            <a href="/api/plan/detail/" class="nav-btn">🗓️ 가용성 플래너</a>
            <a href="/api/user/friend/" class="nav-btn">🤝 친구 네트워크</a>
        </div>
    </div>

    <div class="header">
        <h2>📮 피드 게시판 (Post 공간)</h2>
        <p style="font-size:12px; color:#888; margin:0;">계획 앱 데이터와 친구 시스템이 연동된 공유 타임라인 공간입니다.</p>
    </div>

    <div id="post-feed-container"></div>
</div>

<script>
    document.addEventListener("DOMContentLoaded", loadPostBoard);

    // 📡 [치트키] 금고에서 토큰을 수동으로 꺼내서 봉투에 담아주는 엔진
    function getAuthHeader() {
        const token = localStorage.getItem('access_token');
        return token ? { 'Authorization': `Bearer ${token}` } : {};
    }

    async function loadPostBoard() {
        try {
            // 🚀 [수리 1] 요청을 날릴 때 내 진짜 토큰을 헤더에 무조건 같이 실어서 쏩니다!
            const response = await fetch('/api/post/board/', {
                headers: {
                    'Accept': 'application/json',
                    ...getAuthHeader()
                }
            });
            const data = await response.json();
            const container = document.getElementById('post-feed-container');
            container.innerHTML = '';

            if(!data.feed || data.feed.length === 0) {
                container.innerHTML = `<p style="text-align:center; padding:40px; color:#aaa; font-size:13px;">공유된 계획 피드가 비어있습니다.</p>`;
                return;
            }

            data.feed.forEach(item => {
                const card = document.createElement('div');
                card.className = 'post-card';

                let commentsListHtml = '';
                item.comments.forEach(c => {
                    commentsListHtml += `
                        <div class="comment-line">
                            <span class="comment-user">${c.username}:</span> ${c.content}
                            <span style="font-size:10px; color:#aaa; float:right;">${c.created_at}</span>
                        </div>
                    `;
                });

                // 내가 쓴 글이면 식별 배지를 이쁘게 쥐어줍니다.
                const meBadge = item.is_me ? '<span style="color:#4a90e2; font-size:11px; margin-left:6px; font-weight:bold;">(나)</span>' : '';

                card.innerHTML = `
                    <div class="card-top">
                        <span class="user-info">👤 ${item.user} ${meBadge}</span>
                        <span class="status-badge ${item.status}">${item.status}</span>
                    </div>
                    <div class="post-body">
                        <span style="color:#aaa; font-size:13px;">[${item.category}]</span>
                        <strong>${item.title}</strong>
                    </div>
                    <div style="font-size:12px; color:#666; margin-bottom:10px;">${item.content || '상세 내용 없음'}</div>
                    <div style="font-size:11px; color:#bbb; text-align:right;">날짜: ${item.date} | 가용시간: ${item.ai_duration_hours ? item.ai_duration_hours + 'h' : '기록기반'}</div>

                    <div class="comment-wrapper">
                        <div id="box-${item.type}-${item.id}">
                            ${commentsListHtml ? commentsListHtml : '<p style="font-size:11px; color:#aaa; margin:0;">댓글이 없습니다.</p>'}
                        </div>
                        <div class="input-row">
                            <input type="text" class="comment-input" id="in-${item.type}-${item.id}" placeholder="댓글을 입력하세요...">
                            <button class="submit-btn" onclick="addComment(${item.id}, '${item.type}')">보내기</button>
                        </div>
                    </div>
                `;
                container.appendChild(card);
            });
        } catch(e) { alert("게시판 로드 실패"); }
    }

    async function addComment(id, type) {
        const input = document.getElementById(`in-${type}-${id}`);
        if(!input.value.trim()) return;

        try {
            // 🚀 [수리 2] 백엔드 views.py 맵에 등록된 댓글 엔드포인트 실주소(/api/post/comment/create/)로 정밀 변경하고, 토큰을 동봉합니다.
            const response = await fetch('/api/post/comment/create/', {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json',
                    ...getAuthHeader()
                },
                body: JSON.stringify({ target_id: id, target_type: type, content: input.value })
            });
            const result = await response.json();

            if(response.status === 201) {
                input.value = '';
                loadPostBoard(); // 찰칵 실시간 리프레시 리드로잉!
            } else {
                alert(result.message);
            }
        } catch(e) { alert("통신 실패"); }
    }
</script>
</body>
</html>
