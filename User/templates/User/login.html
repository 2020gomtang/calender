<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Log In</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.css">
    <style>
        :root {
            --bg-color: #ffffff;
            --text-color: #37352f;
            --border-color: #e9e9e6;
            --input-bg: #f7f7f5;
            --primary-color: #2383e2;
            --success-color: #0f7b6c;
        }
        body {
            font-family: 'Pretendard', sans-serif;
            color: var(--text-color);
            background-color: var(--bg-color);
            margin: 0;
            padding: 100px 20px;
            display: flex;
            justify-content: center;
        }
        .auth-card {
            max-width: 400px;
            width: 100%;
        }
        h1 {
            font-size: 30px;
            font-weight: 700;
            margin-bottom: 8px;
            letter-spacing: -0.5px;
        }
        .subtitle {
            font-size: 14px;
            color: #787774;
            margin-bottom: 32px;
        }
        .form-group {
            display: flex;
            flex-direction: column;
            gap: 12px;
            margin-bottom: 20px;
        }
        input {
            font-family: inherit;
            font-size: 15px;
            padding: 12px 14px;
            border: 1px solid var(--border-color);
            border-radius: 4px;
            background-color: var(--input-bg);
        }
        input:focus {
            outline: none;
            background-color: #fff;
            border-color: #b3b3b1;
        }
        button {
            font-family: inherit;
            font-size: 15px;
            font-weight: 500;
            width: 100%;
            padding: 10px;
            border: none;
            border-radius: 4px;
            background-color: var(--primary-color);
            color: white;
            cursor: pointer;
        }
        button:hover { background-color: #1a6cb8; }
        .code-block {
            display: none;
            background-color: #f7f7f5;
            border-radius: 4px;
            padding: 14px;
            margin-top: 20px;
            font-family: monospace;
            font-size: 13px;
            border: 1px solid var(--border-color);
        }
        .token-data { color: var(--success-color); word-break: break-all; }
        .footer-link {
            margin-top: 20px;
            font-size: 14px;
            text-align: center;
            color: #787774;
        }
        .footer-link a { color: var(--primary-color); text-decoration: none; }
    </style>
</head>
<body>
    <div class="auth-card">
        <h1>Log In</h1>
        <div class="subtitle">계정에 로그인하고 토큰을 발급받으세요.</div>

        <div class="form-group">
            <input type="text" id="login-username" placeholder="아이디">
            <input type="password" id="login-password" placeholder="비밀번호">
        </div>
        <button onclick="handleLogin()">로그인하기</button>

        <div id="token-box" class="code-block">
            <div style="font-weight:600; font-size:11px; color:#787774; margin-bottom:6px;">AUTHORIZATION BEARER TOKEN</div>
            <div class="token-data" id="token-text"></div>
        </div>

        <div class="footer-link">
            아직 계정이 없으신가요? <a href="/api/user/signup/">회원가입</a>
        </div>
    </div>

    <script>
        function getCookie(name) {
            let cookieValue = null;
            if (document.cookie && document.cookie !== '') {
                const cookies = document.cookie.split(';');
                for (let i = 0; i < cookies.length; i++) {
                    const cookie = cookies[i].trim();
                    if (cookie.substring(0, name.length + 1) === (name + '=')) {
                        cookieValue = decodeURIComponent(cookie.substring(name.length + 1));
                        break;
                    }
                }
            }
            return cookieValue;
        }

        async function handleLogin() {
            const data = {
                username: document.getElementById('login-username').value,
                password: document.getElementById('login-password').value
            };

            if (!data.username || !data.password) {
                alert("아이디와 비밀번호를 입력해 주세요.");
                return;
            }

            try {
                const response = await fetch('/api/user/login/', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                        'X-CSRFToken': getCookie('csrftoken')
                    },
                    body: JSON.stringify(data)
                });

                const contentType = response.headers.get("content-type");
                if (contentType && contentType.indexOf("application/json") !== -1) {
                    const result = await response.json();
                    alert(result.message);

                    if (response.status === 200) {
                        document.getElementById('token-box').style.display = 'block';
                        document.getElementById('token-text').innerText = `Bearer ${result.access_token}`;
                        localStorage.setItem('user_token', result.access_token);
                    }
                } else {
                    alert(`로그인 실패 (Status: ${response.status})`);
                }
            } catch (error) {
                alert("통신 중 문제가 발생했습니다.");
            }
        }
    </script>
</body>
</html>
